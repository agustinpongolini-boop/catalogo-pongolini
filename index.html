<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Cat&aacute;logo Aberaldo Pongolini SRL 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--nv:#001860;--nvl:#002a8f;--gd:#d4a843;--gl:#f0d060;--wh:#fff;--g50:#f8f9fa;--g100:#f0f1f3;--g200:#e2e4e8;--g300:#c5c8d0;--g500:#6b7280;--g700:#374151;--g900:#111827;--wa:#25d366;--wad:#1da851;--r:12px}
body{font-family:'Montserrat',-apple-system,sans-serif;background:var(--g50);color:var(--g900);-webkit-font-smoothing:antialiased;min-height:100dvh;padding-bottom:80px}
.hd{background:linear-gradient(135deg,var(--nv),var(--nvl));color:var(--wh);padding:16px 16px 12px;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(0,24,96,.25)}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.logo{display:flex;align-items:center;gap:10px}
.logo-i{width:40px;height:40px;background:var(--gd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:var(--nv)}
.logo-t{display:flex;flex-direction:column}
.logo-n{font-weight:700;font-size:16px;letter-spacing:.5px}
.logo-s{font-size:10px;opacity:.7;letter-spacing:1px;text-transform:uppercase}
.cb{position:relative;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.25);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--wh);transition:all .2s}
.cb:hover{background:rgba(255,255,255,.2)}
.cb svg{width:22px;height:22px}
.cbg{position:absolute;top:-4px;right:-4px;background:var(--gd);color:var(--nv);font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center}
.cbg.sh{display:flex}
.sc{position:relative}
.si{width:100%;padding:12px 16px 12px 42px;border:none;border-radius:var(--r);font-size:14px;font-family:inherit;background:rgba(255,255,255,.15);color:var(--wh);outline:none;transition:background .2s}
.si::placeholder{color:rgba(255,255,255,.5)}
.si:focus{background:rgba(255,255,255,.25)}
.si-ico{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.5;color:var(--wh)}
.si-ico svg{width:18px;height:18px}
.si-cl{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.2);border:none;border-radius:50%;width:24px;height:24px;display:none;align-items:center;justify-content:center;cursor:pointer;color:var(--wh);font-size:14px}
.si-cl.sh{display:flex}
.sh-hint{font-size:10px;opacity:.5;margin-top:6px;text-align:center}
.cats{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cc{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;border:1.5px solid var(--g200);background:var(--wh);color:var(--g700);white-space:nowrap}
.cc:hover{border-color:var(--nv);color:var(--nv)}
.cc.ac{background:var(--nv);color:var(--wh);border-color:var(--nv)}
.ri{padding:8px 16px;font-size:12px;color:var(--g500);display:flex;justify-content:space-between}
.pl{padding:0 12px}
.pc{background:var(--wh);border-radius:var(--r);margin-bottom:10px;box-shadow:0 2px 12px rgba(0,24,96,.08);overflow:hidden;border:1px solid var(--g100);animation:fiu .3s ease forwards}
@keyframes fiu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.ph{padding:14px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.pm{flex:1;min-width:0}
.p-code{font-size:15px;font-weight:700;color:var(--nv);margin-bottom:3px}
.p-desc{font-size:12px;color:var(--g500);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.p-badge{flex-shrink:0;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;padding:4px 8px;border-radius:6px;background:var(--g100);color:var(--g500);white-space:nowrap}
.pd{display:none;padding:0 16px 14px;border-top:1px solid var(--g100)}
.pd.op{display:block;padding-top:14px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.si2{background:var(--g50);padding:8px 10px;border-radius:8px}
.sl{font-size:10px;color:var(--g500);text-transform:uppercase;letter-spacing:.3px;margin-bottom:2px}
.sv{font-size:14px;font-weight:600;color:var(--g900)}
.p-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.mt{font-size:11px;padding:4px 10px;border-radius:6px;font-weight:500}
.mt-b{background:#e8f0fe;color:var(--nv)}
.mt-t{background:#fef3e2;color:#92400e}
.mt-o{background:#f0fdf4;color:#166534}
.mt-q{background:#faf5ff;color:#7c3aed}
.ab{width:100%;padding:12px;background:var(--nv);color:var(--wh);border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s}
.ab:hover{background:var(--nvl)}
.ab svg{width:18px;height:18px}
.qc{display:flex;align-items:center;justify-content:center;gap:16px;margin-top:8px}
.qb{width:36px;height:36px;border-radius:50%;border:2px solid var(--nv);background:var(--wh);color:var(--nv);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.qb:hover{background:var(--nv);color:var(--wh)}
.qv{font-size:18px;font-weight:700;min-width:30px;text-align:center}
.q-summary{text-align:center;font-size:12px;color:var(--g500);margin-top:6px;font-weight:500}
.es{text-align:center;padding:60px 30px;color:var(--g500)}
.es svg{width:64px;height:64px;margin-bottom:16px;opacity:.3}
.es h3{font-size:16px;color:var(--g700);margin-bottom:8px}
.es p{font-size:13px;line-height:1.5}
.co{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}
.co.op{opacity:1;pointer-events:auto}
.cp{position:fixed;bottom:0;left:0;right:0;max-height:85dvh;background:var(--wh);border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.cp.op{transform:translateY(0)}
.c-hdl{width:40px;height:4px;background:var(--g300);border-radius:2px;margin:10px auto}
.c-ttl{padding:8px 20px 16px;font-size:18px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.c-cls{background:none;border:none;font-size:24px;cursor:pointer;color:var(--g500);padding:4px}
.c-items{flex:1;overflow-y:auto;padding:0 20px}
.ci{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--g100)}
.ci-info{flex:1}
.ci-c{font-weight:700;font-size:14px;color:var(--nv)}
.ci-d{font-size:11px;color:var(--g500);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-q{display:flex;align-items:center;gap:10px}
.ci-q button{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--g300);background:var(--wh);cursor:pointer;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center}
.ci-q span{font-weight:700;min-width:20px;text-align:center}
.ci-rm{border:none!important;color:#ef4444!important;font-size:18px!important}
.c-empty{text-align:center;padding:40px 20px;color:var(--g500)}
.c-empty svg{width:48px;height:48px;margin-bottom:12px;opacity:.3}
.cf{padding:16px 20px;border-top:1px solid var(--g200)}
.c-tot{display:flex;justify-content:space-between;margin-bottom:12px;font-weight:600}
.wa-sel{display:flex;gap:8px;margin-bottom:12px}
.wa-o{flex:1;padding:10px 8px;border:2px solid var(--g200);border-radius:10px;background:var(--wh);cursor:pointer;text-align:center;font-family:inherit;transition:all .2s}
.wa-o.sel{border-color:var(--wa);background:#f0fdf4}
.wa-ol{font-size:11px;font-weight:600;color:var(--g700)}
.wa-on{font-size:9px;color:var(--g500);margin-top:2px}
.wa-btn{width:100%;padding:14px;background:var(--wa);color:var(--wh);border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .2s}
.wa-btn:hover{background:var(--wad)}
.wa-btn:disabled{background:var(--g300);cursor:default}
.wa-btn svg{width:22px;height:22px}
.lm{text-align:center;padding:16px}
.lm-b{padding:12px 32px;background:var(--wh);border:2px solid var(--nv);color:var(--nv);border-radius:var(--r);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.lm-b:hover{background:var(--nv);color:var(--wh)}
.st{position:fixed;bottom:90px;right:16px;width:44px;height:44px;border-radius:50%;background:var(--nv);color:var(--wh);border:none;box-shadow:0 8px 32px rgba(0,24,96,.12);cursor:pointer;display:none;align-items:center;justify-content:center;z-index:50}
.st.sh{display:flex}
.st svg{width:20px;height:20px}
mark{background:var(--gl);color:var(--nv);padding:0 2px;border-radius:2px}

.dim-bar{display:none;gap:8px;padding:8px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--wh);border-bottom:1px solid var(--g200);align-items:flex-end}
.dim-bar::-webkit-scrollbar{display:none}
.df-field{display:flex;flex-direction:column;gap:3px;flex-shrink:0;min-width:90px}
.df-label{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.3px}
.df-input{width:100%;padding:8px 10px;border:1.5px solid var(--g200);border-radius:8px;font-size:13px;font-family:inherit;font-weight:600;color:var(--g900);outline:none;transition:border-color .2s;background:var(--g50)}
.df-input:focus{border-color:var(--nv);background:var(--wh)}
.df-input::placeholder{color:var(--g300);font-weight:400}
.df-clear{padding:8px 14px;border:1.5px solid var(--g200);border-radius:8px;background:var(--wh);font-family:inherit;font-size:11px;font-weight:600;color:var(--g500);cursor:pointer;white-space:nowrap;transition:all .2s}
.df-clear:hover{border-color:var(--nv);color:var(--nv)}

.xs-section{margin-top:16px;padding-top:16px;border-top:2px dashed var(--g200)}
.xs-title{font-size:13px;font-weight:700;color:var(--nv);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.xs-card{display:flex;align-items:center;gap:10px;padding:10px;background:var(--g50);border-radius:10px;margin-bottom:8px;border:1.5px solid var(--g200)}
.xs-info{flex:1;min-width:0}
.xs-code{font-size:13px;font-weight:700;color:var(--nv)}
.xs-desc{font-size:10px;color:var(--g500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:220px;margin-top:2px}
.xs-meta{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.xs-cat{font-size:9px;padding:2px 6px;border-radius:4px;background:#e8f0fe;color:var(--nv);font-weight:600}
.xs-qty{font-size:9px;padding:2px 6px;border-radius:4px;background:#faf5ff;color:#7c3aed;font-weight:600}
.xs-match{font-size:9px;padding:2px 6px;border-radius:4px;background:#fef3e2;color:#92400e;font-weight:500}
.xs-add{flex-shrink:0;width:36px;height:36px;border-radius:50%;border:2px solid var(--nv);background:var(--wh);color:var(--nv);font-size:20px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.xs-add:hover{background:var(--nv);color:var(--wh)}

.xs-specs{display:flex;flex-wrap:wrap;gap:4px;margin:5px 0}
.xs-spec{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--g100);color:var(--g700)}
.xs-spec b{color:var(--g900);font-weight:700}

.logo-img{height:38px;width:auto;opacity:0.85}
.eq-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}.eq-tag{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:600;letter-spacing:.3px;display:inline-flex;align-items:center;gap:3px;white-space:nowrap}.eq-mahle{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}.eq-nubo{background:#e3f2fd;color:#1565c0;border:1px solid #90caf9}.eq-label{opacity:.7;font-weight:400;font-size:9px;text-transform:uppercase}.eq-search-hint{font-size:11px;color:rgba(255,255,255,.55);margin-top:4px;text-align:center;padding:0 12px}

.hero{background:linear-gradient(135deg,var(--nv) 0%,#001240 100%);color:var(--wh);padding:18px 16px 14px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 50%,rgba(212,168,67,.08) 0%,transparent 70%);pointer-events:none}
.hero-title{font-size:13px;font-weight:600;letter-spacing:2px;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.hero-main{font-size:22px;font-weight:800;margin-bottom:8px;background:linear-gradient(90deg,var(--wh),var(--gl));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-badges{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.hero-badge{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:5px 12px;font-size:11px;font-weight:600;backdrop-filter:blur(4px);white-space:nowrap}
.hero-badge svg{width:14px;height:14px;flex-shrink:0}
.hero-badge .hb-gold{color:var(--gl)}
@keyframes countUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.hero-badge .hb-num{animation:countUp .6s ease forwards}
.hero-close{position:absolute;top:6px;right:10px;background:none;border:none;color:rgba(255,255,255,.4);font-size:18px;cursor:pointer;padding:4px}
.hero-close:hover{color:rgba(255,255,255,.8)}

.srch-suggest{display:none;padding:8px 16px 4px;gap:6px;flex-wrap:wrap;background:var(--wh);border-bottom:1px solid var(--g200)}
.srch-suggest.sh{display:flex}
.srch-suggest .ss-label{font-size:10px;font-weight:600;color:var(--g500);text-transform:uppercase;letter-spacing:.5px;width:100%;margin-bottom:2px}
.ss-chip{padding:6px 12px;border-radius:16px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid var(--g200);background:var(--g50);color:var(--g700);transition:all .2s;white-space:nowrap}
.ss-chip:hover{border-color:var(--nv);color:var(--nv);background:var(--wh)}
.ss-chip.ss-hot{border-color:var(--gd);background:rgba(212,168,67,.08);color:#92400e}
.ss-chip.ss-hot::before{content:'';display:inline-block;width:6px;height:6px;background:var(--gd);border-radius:50%;margin-right:5px}

.tag-pop{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:3px 8px;border-radius:6px;background:linear-gradient(135deg,#fef3e2,#fde68a);color:#92400e;border:1px solid #fcd34d;white-space:nowrap;margin-left:6px;flex-shrink:0}
.tag-pop svg{width:10px;height:10px}

@keyframes cartBounce{0%{transform:scale(1)}30%{transform:scale(1.4)}60%{transform:scale(.9)}100%{transform:scale(1)}}
@keyframes addPulse{0%{box-shadow:0 0 0 0 rgba(0,24,96,.3)}70%{box-shadow:0 0 0 12px rgba(0,24,96,0)}100%{box-shadow:0 0 0 0 rgba(0,24,96,0)}}
@keyframes successFlash{0%{background:var(--nv)}50%{background:#16a34a}100%{background:var(--nv)}}
@keyframes flyToCart{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(.3)}}
.cb.bounce{animation:cartBounce .4s ease}
.ab.pulse{animation:addPulse .5s ease}
.ab.success{animation:successFlash .6s ease}
.cbg.pop{animation:cartBounce .4s ease}
.fly-dot{position:fixed;width:12px;height:12px;background:var(--gd);border-radius:50%;pointer-events:none;z-index:999;animation:flyToCart .5s ease-in forwards}

.tag-ready{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:600;letter-spacing:.3px;padding:3px 8px;border-radius:6px;background:#ecfdf5;color:#166534;border:1px solid #a7f3d0;white-space:nowrap}
.tag-ready svg{width:10px;height:10px}
</style>
</head>

function bCats(){
  var seen={};
  for(var i=0;i<D.length;i++){
    if(!seen[D[i].cat]) seen[D[i].cat]=0;
    seen[D[i].cat]++;
  }
  var el=document.getElementById("cats");
  var h='<button class="cc ac" data-cat="all" onclick="sCatF(this)">Todos</button>';
  var keys=Object.keys(seen);
  for(var j=0;j<keys.length;j++){

}

function sCatF(el){
  aCat=el.getAttribute("data-cat");
  dC=30;
  dimFilters={};
  var all=document.querySelectorAll(".cc");
  for(var i=0;i<all.length;i++) all[i].classList.remove("ac");

  renderDimBar();
  fRender();
  window.scrollTo({top:0,behavior:"smooth"});
}

function renderDimBar(){
  var bar=document.getElementById("dimBar");
  var fields=DIM_CATS[aCat];
  if(!fields){bar.innerHTML="";bar.style.display="none";return;}
  bar.style.display="flex";
  var h="";
  for(var i=0;i<fields.length;i++){
    var f=fields[i];
    var val=dimFilters[f.key]||"";
    h+='<div class="df-field">';
    h+='<label class="df-label">'+esc(f.label)+'</label>';
    h+='<input type="number" step="0.01" class="df-input" placeholder="'+f.ph+'" value="'+val+'" data-key="'+f.key+'" oninput="onDimInput(this)">';
    h+='</div>';
  }
  h+='<div class="df-field" style="align-self:flex-end"><button class="df-clear" onclick="clearDims()">Limpiar</button></div>';
  bar.innerHTML=h;
}

function onDimInput(el){
  var key=el.getAttribute("data-key");
  var val=el.value.trim();
  if(val===""){delete dimFilters[key];}
  else{dimFilters[key]=parseFloat(val);}
  dC=30;
  fRender();
}

function clearDims(){
  dimFilters={};
  renderDimBar();
  dC=30;
  fRender();
}

function norm(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]/g," ").replace(/\s+/g," ").trim();
}

function fRender(){
  var r=D.slice();
  if(aCat!=="all"){
    var filtered=[];
    for(var i=0;i<r.length;i++){
      if(r[i].cat===aCat) filtered.push(r[i]);
    }
    r=filtered;
  }
  if(sQ){
    var q=norm(sQ);
    var ts=q.split(" ");
    var temp=[];
    for(var i=0;i<ts.length;i++){
      if(ts[i].length>0) temp.push(ts[i]);
    }
    ts=temp;
    var matched=[];
    for(var i=0;i<r.length;i++){
      var p=r[i];
      var s=norm([p.c,p.b,p.d,p.o,p.t,p.cat].join(" "));
      var ok=true;
      for(var j=0;j<ts.length;j++){
        if(s.indexOf(ts[j])<0){ok=false;break;}
      }
      if(ok) matched.push(p);
    }
    r=matched;
    var ql=sQ.toLowerCase();
    r.sort(function(a,b){
      var ae=a.c.toLowerCase().indexOf(ql)>=0?0:1;
      var be=b.c.toLowerCase().indexOf(ql)>=0?0:1;
      return ae-be;
    });
  }
  // Dimension filters: match within +/- 0.5mm tolerance
  var dkeys=Object.keys(dimFilters);
  if(dkeys.length>0){
    var tol=0.5;
    var dm=[];
    for(var i=0;i<r.length;i++){
      var p=r[i];
      var ok=true;
      for(var j=0;j<dkeys.length;j++){
        var k=dkeys[j];

        var pval=p.s[k];
        if(!pval){ok=false;break;}
        var num=parseFloat(pval);
        if(isNaN(num)||Math.abs(num-target)>tol){ok=false;break;}
      }
      if(ok) dm.push(p);
    }
    r=dm;
  }
  fP=r;
  render();
}

function hi(t){
  if(!sQ||!t) return esc(t);
  var e=esc(t);
  var ts=sQ.split(/\s+/);
  for(var i=0;i<ts.length;i++){
    if(ts[i].length===0) continue;
    var re=new RegExp("("+ts[i].replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi");
    e=e.replace(re,"<mark>$1</mark>");
  }
  return e;
}

function esc(s){
  if(!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// Cross-sell: extract keywords from description
var STOP_WORDS={"DE":1,"LA":1,"EL":1,"EN":1,"CON":1,"POR":1,"DEL":1,"ADM":1,"ESC":1,"MOD":1,"MOT":1,"LTS":1,"VALV":1,"GUIA":1,"ASIENTO":1,"VALVULA":1,"CC":1,"MM":1,"PARA":1};

function xKeywords(desc){
  var d=desc.toUpperCase().replace(/[^A-Z0-9.]/g," ");
  var ws=d.split(/\s+/);
  var out={};
  for(var i=0;i<ws.length;i++){
    var w=ws[i];
    if(w.length>1 && !STOP_WORDS[w]) out[w]=1;
  }
  return out;
}

// Find cross-sell suggestions for items in cart
function getXSell(){
  var items=[];
  for(var k in cart) items.push(cart[k]);
  if(items.length===0) return [];

  // Build list of cart item full data
  var cartFull=[];
  for(var i=0;i<items.length;i++){
    for(var j=0;j<D.length;j++){
      if(D[j].c===items[i].c){cartFull.push(D[j]);break;}
    }
  }

  // For each guia in cart, find matching asientos and vice versa
  var suggestions=[];
  var seen={};
  // Also track what's already in cart
  var inCart={};
  for(var k in cart) inCart[k]=1;

  for(var i=0;i<cartFull.length;i++){
    var p=cartFull[i];
    var isGuia=p.cat==="Gu\u00edas de V\u00e1lvula"||p.cat==="Gu\u00edas Motos";
    var isAsiento=p.cat==="Asientos de V\u00e1lvula"||p.cat==="Asientos Bronce Al.";
    if(!isGuia && !isAsiento) continue;

    var targetCats=isGuia?{"Asientos de V\u00e1lvula":1,"Asientos Bronce Al.":1}:{"Gu\u00edas de V\u00e1lvula":1,"Gu\u00edas Motos":1};
    var kw=xKeywords(p.d);
    var kwBrand=p.b;

    for(var j=0;j<D.length;j++){
      var c=D[j];
      if(!targetCats[c.cat]) continue;
      if(inCart[c.c]||seen[c.c]) continue;
      if(c.b!==kwBrand) continue;

      // Count shared keywords
      var ck=xKeywords(c.d);
      var shared=0;
      for(var w in kw){if(ck[w]) shared++;}
      if(shared>=2){
        suggestions.push({score:shared,product:c,because:p.c});
        seen[c.c]=1;
      }
    }
  }

  // Sort by score desc, limit to 5
  suggestions.sort(function(a,b){return b.score-a.score});
  return suggestions.slice(0,5);
}

function aC(c,el){

  // Micro-animations
  if(el){
    el.classList.add("success");
    flyToCart(el);
    setTimeout(function(){el.classList.remove("success")},650);

}

      // Specs inline
      var spKeys=Object.keys(sp.s);
      if(spKeys.length>0){
        h+='<div class="xs-specs">';
        for(var k=0;k<spKeys.length;k++){
          h+='<span class="xs-spec">'+esc(spKeys[k])+': <b>'+esc(sp.s[spKeys[k]])+'</b></span>';
        }
        h+='</div>';
      }

}
